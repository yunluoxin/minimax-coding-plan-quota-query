name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd MiniMaxMenuBar
          xcodegen generate
          perl -i -pe 's/objectVersion = 77/objectVersion = 56/g' MiniMaxMenuBar.xcodeproj/project.pbxproj

      - name: Build
        run: |
          cd MiniMaxMenuBar
          xcodebuild -project MiniMaxMenuBar.xcodeproj -scheme MiniMaxMenuBar \
            -configuration Release build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR="$(pwd)/.build"

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "MARKETING_VERSION" MiniMaxMenuBar/project.yml | sed 's/.*: *"\([^"]*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_NAME=MiniMaxMenuBar" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          cd MiniMaxMenuBar
          APP_PATH=".build/Release/MiniMaxMenuBar.app"
          VERSION=${{ steps.version.outputs.VERSION }}
          DMG_NAME="MiniMaxMenuBar-${VERSION}"
          DMG_TEMP="/tmp/${DMG_NAME}-temp.dmg"
          DMG_FINAL="${DMG_NAME}.dmg"

          hdiutil create "$DMG_TEMP" -size 100M -ov -volname "MiniMaxMenuBar" \
            -fs HFS+ -srcfolder "$APP_PATH" -format UDRW -quiet
          hdiutil convert "$DMG_TEMP" -format UDZO -o "$DMG_FINAL" -quiet
          rm -f "$DMG_TEMP"

          ls -lh "$DMG_FINAL"

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: MiniMaxMenuBar/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniMaxMenuBar-dmg
          path: MiniMaxMenuBar/*.dmg
