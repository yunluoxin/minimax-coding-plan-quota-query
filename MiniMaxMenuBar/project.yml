name: MiniMaxMenuBar
options:
  bundleIdPrefix: com.minimax
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MiniMaxMenuBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/
      - path: Shared/
    settings:
      base:
        PRODUCT_NAME: MiniMaxMenuBar
        PRODUCT_BUNDLE_IDENTIFIER: com.minimax.menubar
        INFOPLIST_FILE: Resources/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_REQUIRE_ENTITLEMENTS: NO
        ENABLE_HARDENED_RUNTIME: NO
        COMBINE_HIDPI_IMAGES: YES

schemes:
  MiniMaxMenuBar:
    build:
      targets:
        MiniMaxMenuBar: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release